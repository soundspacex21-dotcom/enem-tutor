<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tutor ENEM — IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0F0F0D;
  --surface: #1A1A17;
  --surface2: #242420;
  --text: #F0EDE4;
  --muted: #888880;
  --border: #2E2E28;
  --accent: #E8D44D;
  --radius: 14px;
  --radius-sm: 8px;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
header {
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(15,15,13,0.95);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.avatar {
  width: 40px;
  height: 40px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.header-info h1 {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.header-info p {
  font-size: 12px;
  color: #4CAF7D;
}
.matérias-btn {
  margin-left: auto;
  font-size: 12px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* CHIPS */
.chips-wrap {
  padding: 0.75rem 1rem;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.chips-wrap::-webkit-scrollbar { display: none; }
.chip {
  white-space: nowrap;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg {
  display: flex;
  gap: 10px;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg.user .msg-avatar { background: var(--accent); }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.7;
}

.msg.bot .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

.msg.user .msg-bubble {
  background: var(--accent);
  color: #0F0F0D;
  border-bottom-right-radius: 4px;
  font-weight: 500;
}

.msg-bubble pre {
  background: var(--surface2);
  border-radius: 8px;
  padding: 10px;
  margin-top: 8px;
  overflow-x: auto;
  font-size: 13px;
  white-space: pre-wrap;
}

.msg-bubble strong { font-weight: 600; }

/* TYPING */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: typing 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* WELCOME */
.welcome {
  text-align: center;
  padding: 2rem 1rem;
}
.welcome .emoji { font-size: 48px; margin-bottom: 1rem; }
.welcome h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.welcome p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
.quick-questions { display: flex; flex-direction: column; gap: 8px; }
.quick-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  text-align: left;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s;
}
.quick-btn:hover { border-color: var(--accent); }

/* INPUT */
.input-area {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.15s;
}
.input-row:focus-within { border-color: var(--accent); }
.input-row textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  resize: none;
  max-height: 120px;
  min-height: 24px;
  line-height: 1.5;
  padding: 2px 0;
}
.input-row textarea::placeholder { color: var(--muted); opacity: 0.6; }
.send-btn {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn svg { color: #0F0F0D; }
</style>
</head>
<body>

<header>
  <div class="avatar">🎓</div>
  <div class="header-info">
    <h1>Tutor ENEM</h1>
    <p>● Online agora</p>
  </div>
</header>

<div class="chips-wrap">
  <div class="chip" onclick="sendChip('Matemática')">📐 Matemática</div>
  <div class="chip" onclick="sendChip('Português')">📖 Português</div>
  <div class="chip" onclick="sendChip('História')">🏛️ História</div>
  <div class="chip" onclick="sendChip('Geografia')">🌍 Geografia</div>
  <div class="chip" onclick="sendChip('Física')">⚡ Física</div>
  <div class="chip" onclick="sendChip('Química')">🧪 Química</div>
  <div class="chip" onclick="sendChip('Biologia')">🧬 Biologia</div>
  <div class="chip" onclick="sendChip('Filosofia')">💭 Filosofia</div>
  <div class="chip" onclick="sendChip('Sociologia')">👥 Sociologia</div>
  <div class="chip" onclick="sendChip('Inglês')">🇺🇸 Inglês</div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="emoji">🎓</div>
    <h2>Olá! Sou seu Tutor do ENEM</h2>
    <p>Pode me perguntar qualquer coisa sobre as matérias do ENEM. Explico de forma simples e resolvo exercícios passo a passo!</p>
    <div class="quick-questions">
      <button class="quick-btn" onclick="sendQuick('Como calcular porcentagem? Me dá um exemplo prático')">📐 Como calcular porcentagem?</button>
      <button class="quick-btn" onclick="sendQuick('O que foi a Revolução Industrial e quais seus impactos?')">🏛️ O que foi a Revolução Industrial?</button>
      <button class="quick-btn" onclick="sendQuick('Explica o que é fotossíntese de forma simples')">🧬 O que é fotossíntese?</button>
      <button class="quick-btn" onclick="sendQuick('Como identificar o tema de uma redação ENEM?')">✍️ Como identificar o tema da redação?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Pergunte qualquer coisa sobre o ENEM..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
let conversationHistory = [];
let isTyping = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendChip(materia) {
  document.getElementById('input').value = `Quero estudar ${materia} para o ENEM. Por onde devo começar?`;
  sendMessage();
}

function sendQuick(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n\n/g, '</p><p style="margin-top:8px">')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  conversationHistory.push({ role: 'user', content: text });
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // Show typing
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  const typingEl = addTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await res.json();
    typingEl.remove();

    if (data.error) {
      addMessage('bot', '❌ Erro: ' + data.error);
    } else {
      conversationHistory.push({ role: 'assistant', content: data.reply });
      addMessage('bot', data.reply);
    }
  } catch (err) {
    typingEl.remove();
    addMessage('bot', '❌ Erro de conexão. Tente novamente.');
  }

  isTyping = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function addMessage(role, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'bot' ? '🎓' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'bot') {
    bubble.innerHTML = '<p>' + formatText(text) + '</p>';
  } else {
    bubble.textContent = text;
  }

  div.appendChild(avatarEl);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = '🎓';

  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  div.appendChild(avatarEl);
  div.appendChild(typing);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}
</script>
</body>
</html>
